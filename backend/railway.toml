[build]
builder = "NIXPACKS"

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/docs"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[build.args]
PYTHON_VERSION = "3.11"

[[services]]
name = "backend"
source = "."
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
